<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar-se</title>

    <!-- Estilos CSS -->
    <link rel="stylesheet" href="../CSS/Cadastrar-se.css">
    <link rel="stylesheet" href="../CSS/PGs-Default.css">
</head>

<body class="preload">
    <div class="Container">
        <div class="Div-Form">
            <form method="POST" action="http://localhost:3000/cadastro" autocomplete="on">
                <fieldset>
                    <legend>
                        <h2>Formulário de Cadastro do Usuário</h2>
                    </legend>

                    <div class="Box-Entrada">
                        <label for="nome_completo">Nome Completo <b style="color: red;">*</b></label>
                        <input type="text" name="nome_completo" placeholder="Vinícius" maxlength="50" required>
                    </div>

                    <div class="Box-Entrada">
                        <label for="email">E-Mail <b style="color: red;">*</b></label>
                        <input type="email" name="email" placeholder="email@gmail.com" required>
                    </div>

                    <div class="Box-Entrada">
                        <label for="telefone">Telefone <b style="color: red;">*</b></label>
                        <input type="tel" name="telefone" placeholder="+55 51 9.0000-0000" required>
                    </div>

                    <div class="Box-Entrada">
                        <label for="sexo">Sexo <b style="color: red;">*</b></label>

                        <div class="Box-Select">
                            <input type="radio" name="sexo" value="Masculino">
                            <label for="Sexo-Masculino">Masculino</label>
                        </div>

                        <div class="Box-Select">
                            <input type="radio" name="sexo" value="Feminino">
                            <label for="Sexo-Feminino">Feminino</label>
                        </div>
                    </div>

                    <div class="Box-Entrada">
                        <label for="data_nasc">Data de Nascimento <b style="color: red;">*</b></label>
                        <input type="date" name="data_nasc" required>
                    </div>

                    <div class="Box-Entrada">
                        <label for="cidade">Cidade <b style="color: red;">*</b></label>
                        <input type="text" name="cidade" placeholder="Viamão" required>
                    </div>

                    <div class="Box-Entrada">
                        <label for="login">Login <b style="color: red;">*</b></label>
                        <input type="text" name="login" placeholder="eu_sou Xampp" maxlength="21" required>
                    </div>

                    <div class="Box-Entrada">
                        <label for="senha">Senha <b style="color: red;">*</b></label>
                        <input type="password" name="senha" placeholder="senha-@123" maxlength="18" required>
                    </div>

                    <div class="Box-Buttons">
                        <button>
                            <!-- Espera um tempo na troca de Páginas -->
                            <!-- Voltar Página <a href="#" onclick="setTimeout(() => { window.location.href='../../index.html'; }, 100); return false;">Voltar</a> -->
                            <a href="../../index.html" onclick="Transicao_Suave(event)">Voltar</a>
                        </button>

                        <button type="submit">Inscrever-se</button>
                    </div>

                </fieldset>
            </form>
        </div>
    </div>

    <script src="../JS/Delay-Pages.js" defer></script>
</body>

</html>
