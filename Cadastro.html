<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div class="Container">
    <div class="Div-Form">
      <form action="" method="post" autocomplete="on" accept-charset="UTF-8">
        <fieldset>
          <legend>Cadastrar-se</legend>

          <!-- Preencher com Nome e Sobrenome -->
          <div class="Box-Entrada">
            <span>*</span><label for="P_Nome">Primeiro Nome:</label>
            <input type="text" name="P_Nome" id="P_Nome" placeholder="Digite seu Nome" maxlength="15" required>
          </div>

          <div class="Box-Entrada">
            <span>*</span><label for="S_Nome">Sobrenome:</label>
            <input type="text" name="S_Nome" id="S_Nome" placeholder="Digite seu Sobrenome" maxlength="15" required>
          </div>

          <!-- Data de Nascimento -->
          <div class="Box-Entrada">
            <span>*</span><label for="Data_Nasc">Data de Nascimento:</label>
            <input type="date" id="Data_Nasc" name="Data_Nasc" required>
          </div>

          <!-- E-mail -->
          <div class="Box-Entrada">
            <span>*</span><label for="Email">E-mail:</label>
            <input type="email" id="Email" name="Email" placeholder="digite@gmail.com" required>
          </div>

          <!-- Telefone -->
          <div class="Box-Entrada">
            <span>*</span><label for="Cell">Telefone</label>
            <input type="tel" id="Cell" name="Cell" placeholder="00 0.1234-1234" required>
          </div>

          <!-- Selecionar o Sexo -->
          <div class="Box-Entrada">
            <span>*</span><label for="Sexo">Selecione o Sexo:</label>
            <select id="Sexo" name="Sexo">
              <option>Selecionar</option>
              <option value="M">Masculino</option>
              <option value="F">Feminino</option>
            </select>
          </div>

          <!-- Cidade + Estado -->
          <div class="Box-Entrada">
            <span>*</span><label for="Cidade">Cidade:</label>
            <input type="text" id="Cidade" name="Cidade" placeholder="Viamão" maxlength="15" required>
          </div>
          <div class="Box-Entrada">
            <span>*</span><label for="Estado-UF">Estado UF:</label>
            <input type="text" id="Estado-UF" name="Estado-UF" placeholder="RS" maxlength="3" required>
          </div>

          <!-- Senha -->
          <div class="Box-Entrada">
            <span>*</span><label for="Senha">Senha:</label>
            <input type="password" id="Senha" name="Senha" placeholder="123456" maxlength="16" required>
          </div>

          <div class="Box-btns">
            <!-- Voltar -->
            <button id="btn-Voltar" class="btn" type="button">Voltar</button>

            <!-- Botão de Envio -->
            <button id="btn-Cad" class="btn" type="button">Cadastrar-se</button>

            <!-- Resetar Formulário -->
            <input id="btn-Resetar" class="btn" type="reset" value="Resetar">
          </div>
        </fieldset>
      </form>
    </div>
  </div>

  <!-- Cleave.js marcarar Números -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>
  <!-- Máscaras -->
  <script>
    // Máscara para Telefone
    new Clave('#Cell', {
      phone: true,
      phoneRegionCode: 'BR'
    });

    // Máscara para Data de Nascimento
    new Clave('#Data_Nasc', {
      date: true,
      delimiter: '-',
      datePattern: ['Y', 'm', 'd']
    });
  </script>
</body>

</html>
